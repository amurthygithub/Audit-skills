id: mus-sieve-poc
skill: audit-workpapers
use_case: UC-01
description: >
  The SOX-600 PoC case: MUS sizing at BV $5M, TM $200k, RIA 5% must yield
  n=75 and SI=$66,667 (AICPA RF 3.00 at 0 expected misstatements).
input:
  population_book_value: 5000000
  tolerable_misstatement: 200000
  risk_of_incorrect_acceptance: 0.05
  expected_overstatements: 0
expected:
  mus_evaluation.sample_size: 75
  mus_evaluation.sampling_interval: 66667
  mus_evaluation.reliability_factor: 3.0
  classification: MUS_SAMPLE_SIZE_75
validators: [oracle_match]
coverage_tags: [mus.sample-size, mus.sampling-interval, boundary.ria-0.05]
