name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-title:
    name: PR title convention
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR title matches conventional-commits pattern
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|docs|chore)\([a-z0-9][a-z0-9-]+\): .+$'; then
            echo "::error::PR title '$PR_TITLE' does not match required pattern"
            echo "::error::Expected: type(skill-slug): description"
            echo "::error::Types: feat, fix, docs, chore"
            echo "::error::Example: feat(nist-800-53-rmf): add healthcare industry view"
            exit 1
          fi
          echo "PR title OK: $PR_TITLE"

  lint:
    name: Lint skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Run Tier 0a linter
        # TEMPLATE is the scaffold - it intentionally fails lint. Skip it.
        run: python tools/lint_skill.py skills/nist-800-53-rmf skills/isaca-audit-methodology skills/coso-internal-controls skills/aicpa-soc-reporting skills/audit-workpapers

  test:
    name: pytest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Run tests
        run: pytest skills/ tests/ -q
