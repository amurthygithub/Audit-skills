name: Nightly link rot check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  link-rot:
    name: Check section 10 manifest citations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pyyaml
      - name: Run link rot check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/check_link_rot.py
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-rot-report
          path: link-rot-report.md
          if-no-files-found: ignore
